<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>华链AI · 总经理信箱</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 32px 20px;
            background: linear-gradient(145deg, #f8faff 0%, #f0f4ff 100%);
            background-attachment: fixed;
        }

        /* ===== 主容器 ===== */
        .container {
            width: 100%;
            max-width: 460px;
            background: #ffffff;
            border-radius: 36px;
            padding: 40px 32px 32px;
            box-shadow: 0 20px 60px rgba(68, 84, 148, 0.10), 0 8px 24px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        /* 顶部装饰线 — 科技感 */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #3b7cff, #6c5ce7, transparent);
            opacity: 0.6;
        }

        /* ===== 品牌区 (居中) ===== */
        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
        }
        .brand .logo-main {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1.2;
            background: linear-gradient(135deg, #3b7cff, #6c5ce7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand .logo-main .ai-light {
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand .logo-english {
            font-size: 14px;
            font-weight: 500;
            color: #a0b2c9;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 2px;
        }
        .brand .slogan {
            font-size: 13px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
            margin-top: 10px;
            font-weight: 600;
            border-top: 1px solid #f0f4fe;
            padding-top: 12px;
            width: 100%;
        }

        /* ===== 标题区 (居中) ===== */
        .card-header {
            margin-bottom: 32px;
        }
        .card-header .title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.4px;
            background: linear-gradient(135deg, #3b7cff, #6c5ce7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            position: relative;
        }
        .card-header .title .icon-mail {
            display: inline-block;
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #3b7cff, #6c5ce7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 28px;
            font-weight: 300;
            margin-right: 4px;
            vertical-align: middle;
        }
        .card-header .desc {
            font-size: 14px;
            color: #7a8aa0;
            margin-top: 6px;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* ===== 表单 ===== */
        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group .label-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .form-group .label-row label {
            font-size: 14px;
            font-weight: 600;
            color: #1f2a44;
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .form-group .label-row label .field-icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #3b7cff, #6c5ce7);
            border-radius: 6px;
            color: #fff;
            font-size: 11px;
            line-height: 18px;
            text-align: center;
            font-weight: 700;
            flex-shrink: 0;
        }
        .form-group .label-row .required {
            color: #e74c5e;
            margin-left: 2px;
        }
        .form-group .label-row .char-count {
            font-size: 12px;
            color: #a0b2c9;
            font-weight: 400;
        }

        /* ===== 下拉菜单 (自定义) ===== */
        .select-wrap {
            position: relative;
        }
        .select-wrap select {
            width: 100%;
            padding: 14px 18px;
            background: #f8fcff;
            border: 1.5px solid #e6edf6;
            border-radius: 16px;
            font-size: 15px;
            font-family: inherit;
            color: #1a2b4a;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }
        .select-wrap select:focus {
            background: #ffffff;
            border-color: #3b7cff;
            box-shadow: 0 0 0 4px rgba(59, 124, 255, 0.06);
        }
        .select-wrap select.error {
            border-color: #f87171;
            box-shadow: 0 0 0 4px rgba(248, 113, 113, 0.06);
        }
        .select-wrap::after {
            content: "▾";
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0b2c9;
            font-size: 14px;
            pointer-events: none;
        }
        .select-wrap .error-tip {
            font-size: 12px;
            color: #f87171;
            margin-top: 6px;
            display: none;
            font-weight: 400;
            padding-left: 4px;
        }
        .select-wrap .error-tip.show {
            display: block;
            animation: fadeSlide 0.25s ease;
        }

        /* ===== 单选卡片 (响应等级) 数字化风格 ===== */
        .radio-grid {
            display: grid;
            gap: 10px;
            grid-template-columns: 1fr 1fr;
        }
        .radio-item {
            position: relative;
            padding: 12px 12px;
            border-radius: 16px;
            background: #f7faff;
            border: 1.5px solid #e6edf6;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
            user-select: none;
            min-height: 48px;
            overflow: hidden;
        }
        .radio-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #3b7cff, #6c5ce7);
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 16px;
        }
        .radio-item:hover {
            background: #f0f6ff;
            border-color: #b8cae0;
        }
        .radio-item input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }
        .radio-item .radio-label {
            font-size: 14px;
            font-weight: 500;
            color: #3a4a66;
            transition: color 0.2s;
            cursor: pointer;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .radio-item .radio-label .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.4;
            transition: opacity 0.2s;
        }
        .radio-item.active {
            background: #eef4fe;
            border-color: #3b7cff;
            box-shadow: 0 0 0 3px rgba(59, 124, 255, 0.08), 0 4px 12px rgba(59, 124, 255, 0.06);
        }
        .radio-item.active .radio-label {
            color: #1a2b4a;
            font-weight: 600;
        }
        .radio-item.active .radio-label .dot {
            opacity: 1;
        }
        .radio-item .check-mark {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 20px;
            height: 20px;
            background: #3b7cff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #fff;
            opacity: 0;
            transform: scale(0.6);
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 10px rgba(59, 124, 255, 0.25);
            z-index: 2;
        }
        .radio-item.active .check-mark {
            opacity: 1;
            transform: scale(1);
        }
        /* 选中时脉冲光效 - 优雅降级，不支持不影响功能 */
        .radio-item.active::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 18px;
            background: transparent;
            border: 1.5px solid rgba(59, 124, 255, 0.2);
            animation: pulseRing 1.8s ease-out infinite;
            pointer-events: none;
        }
        @keyframes pulseRing {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.08); opacity: 0; }
        }

        /* ===== 输入框 ===== */
        .input-wrap {
            position: relative;
        }
        .input-wrap input,
        .input-wrap textarea {
            width: 100%;
            padding: 14px 18px;
            background: #f8fcff;
            border: 1.5px solid #e6edf6;
            border-radius: 16px;
            font-size: 15px;
            font-family: inherit;
            color: #1a2b4a;
            transition: all 0.3s ease;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        .input-wrap input::placeholder,
        .input-wrap textarea::placeholder {
            color: #b0c2d6;
            font-weight: 400;
        }
        .input-wrap input:focus,
        .input-wrap textarea:focus {
            background: #ffffff;
            border-color: #3b7cff;
            box-shadow: 0 0 0 4px rgba(59, 124, 255, 0.06);
        }
        /* 科技感底部光条 - 仅现代浏览器，不支持则忽略 */
        .input-wrap input:focus + .input-glow,
        .input-wrap textarea:focus + .input-glow {
            opacity: 1;
            transform: scaleX(1);
        }
        .input-wrap .input-glow {
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #3b7cff, #6c5ce7, transparent);
            opacity: 0;
            transform: scaleX(0.5);
            transition: all 0.4s ease;
            pointer-events: none;
            border-radius: 2px;
        }
        .input-wrap input.error,
        .input-wrap textarea.error {
            border-color: #f87171;
            box-shadow: 0 0 0 4px rgba(248, 113, 113, 0.06);
        }
        .input-wrap input.error + .input-glow,
        .input-wrap textarea.error + .input-glow {
            background: linear-gradient(90deg, transparent, #f87171, transparent);
        }
        .input-wrap textarea {
            min-height: 120px;
            resize: vertical;
            line-height: 1.6;
        }
        .input-wrap .error-tip {
            font-size: 12px;
            color: #f87171;
            margin-top: 6px;
            display: none;
            font-weight: 400;
            padding-left: 4px;
        }
        .input-wrap .error-tip.show {
            display: block;
            animation: fadeSlide 0.25s ease;
        }

        /* ===== 提交按钮 ===== */
        .submit-btn {
            width: 100%;
            padding: 16px 20px;
            background: linear-gradient(135deg, #3b7cff 0%, #6c5ce7 100%);
            border: none;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-top: 8px;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 24px rgba(59, 124, 255, 0.2);
            position: relative;
            overflow: hidden;
        }
        .submit-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #5a8cff, #7b6ce7);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .submit-btn:hover::after {
            opacity: 1;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 36px rgba(59, 124, 255, 0.30);
        }
        .submit-btn:active {
            transform: translateY(0) scale(0.98);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        .submit-btn .btn-text,
        .submit-btn .btn-loader {
            position: relative;
            z-index: 1;
        }
        .submit-btn .btn-loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .submit-btn.loading .btn-text {
            display: none;
        }
        .submit-btn.loading .btn-loader {
            display: block;
        }

        /* ===== 提交说明 ===== */
        .footnote {
            margin-top: 22px;
            padding: 16px 20px;
            background: linear-gradient(135deg, #f0f4ff 0%, #e8eeff 100%);
            border-radius: 16px;
            border: 1px solid #d4ddf0;
            text-align: left;
        }
        .footnote p {
            font-size: 13px;
            color: #5a6f8a;
            line-height: 1.7;
            letter-spacing: 0.2px;
            text-align: center;
        }
        .footnote p strong {
            color: #1f2a44;
            font-weight: 600;
        }

        /* ===== 成功状态 ===== */
        .success-area {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 20px;
            text-align: center;
        }
        .success-area .success-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #34d399, #10b981);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #fff;
            box-shadow: 0 12px 32px rgba(16, 185, 129, 0.20);
            margin-bottom: 20px;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .success-area h2 {
            font-size: 24px;
            font-weight: 700;
            color: #0b1a33;
            margin-bottom: 8px;
            letter-spacing: -0.2px;
        }
        .success-area p {
            font-size: 15px;
            color: #5a6f8a;
            line-height: 1.7;
            max-width: 280px;
        }
        .success-area .success-sub {
            margin-top: 6px;
            font-size: 13px;
            color: #a0b2c9;
        }

        /* ===== 动画 ===== */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes popIn {
            0% { transform: scale(0.4) rotate(-6deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(-6px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .container {
                padding: 28px 18px 24px;
                border-radius: 28px;
            }
            .brand .logo-main { font-size: 28px; }
            .brand .logo-english { font-size: 12px; letter-spacing: 2px; }
            .brand .slogan { font-size: 12px; }
            .card-header .title { font-size: 24px; }
            .radio-grid { gap: 8px; }
            .radio-item { padding: 10px 8px; min-height: 42px; }
            .radio-item .radio-label { font-size: 13px; }
            .input-wrap input,
            .input-wrap textarea,
            .select-wrap select { font-size: 14px; padding: 12px 14px; }
            .submit-btn { font-size: 16px; padding: 14px; }
            .footnote p { font-size: 12px; }
        }
        @media (max-width: 380px) {
            .brand .logo-main { font-size: 24px; }
            .brand .logo-english { font-size: 10px; }
            .radio-item { padding: 8px 6px; min-height: 38px; }
            .radio-item .radio-label { font-size: 12px; }
        }
    </style>
</head>

    <script>
        // ===== EmailJS 初始化 =====
        emailjs.init("3xRBgUPwHXKo0zh2R");

        // ============================================================
        //  工具
        // ============================================================
        const phoneReg = /^1[3-9]\d{9}$/;

        // ============================================================
        //  下拉菜单错误清除
        // ============================================================
        const feedbackSelect = document.getElementById('feedbackType');
        feedbackSelect.addEventListener('change', function() {
            document.getElementById('typeError').classList.remove('show');
            this.classList.remove('error');
        });

        // ============================================================
        //  单选卡片交互 (响应等级)
        // ============================================================
        document.querySelectorAll('.radio-item').forEach(item => {
            item.addEventListener('click', function(e) {
                if (e.target.closest('input')) return;
                const radio = this.querySelector('input[type="radio"]');
                if (radio) {
                    radio.checked = true;
                    radio.dispatchEvent(new Event('change', { bubbles: true }));
                }
            });

            const radio = item.querySelector('input[type="radio"]');
            if (radio) {
                radio.addEventListener('change', function() {
                    const group = this.closest('.radio-grid');
                    group.querySelectorAll('.radio-item').forEach(el => el.classList.remove('active'));
                    if (this.checked) {
                        this.closest('.radio-item').classList.add('active');
                        document.getElementById('urgencyError').classList.remove('show');
                    }
                });
                if (radio.checked) {
                    item.classList.add('active');
                }
            }
        });

        // ============================================================
        //  字数统计
        // ============================================================
        const contentEl = document.getElementById('content');
        const charCountEl = document.getElementById('charCount');
        contentEl.addEventListener('input', function() {
            const len = this.value.length;
            charCountEl.textContent = len + ' / 500';
            if (len > 0) {
                document.getElementById('contentError').classList.remove('show');
                this.classList.remove('error');
            }
        });

        // ============================================================
        //  实时清除错误
        // ============================================================
        ['name', 'phone'].forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('input', function() {
                const err = document.getElementById(id + 'Error');
                err.classList.remove('show');
                this.classList.remove('error');
            });
            el.addEventListener('blur', function() {
                if (id === 'phone' && this.value.trim() && !phoneReg.test(this.value.trim())) {
                    document.getElementById('phoneError').classList.add('show');
                    this.classList.add('error');
                }
            });
        });

        // ============================================================
        //  表单验证 & 提交
        // ============================================================
        const form = document.getElementById('mailboxForm');
        const submitBtn = document.getElementById('submitBtn');

        function validate() {
            let valid = true;

            const type = document.getElementById('feedbackType').value;
            if (!type) {
                document.getElementById('typeError').classList.add('show');
                document.getElementById('feedbackType').classList.add('error');
                valid = false;
            } else {
                document.getElementById('typeError').classList.remove('show');
                document.getElementById('feedbackType').classList.remove('error');
            }

            const urgency = document.querySelector('input[name="urgency"]:checked');
            if (!urgency) {
                document.getElementById('urgencyError').classList.add('show');
                valid = false;
            } else {
                document.getElementById('urgencyError').classList.remove('show');
            }

            const name = document.getElementById('name').value.trim();
            if (!name) {
                document.getElementById('nameError').classList.add('show');
                document.getElementById('name').classList.add('error');
                valid = false;
            } else {
                document.getElementById('nameError').classList.remove('show');
                document.getElementById('name').classList.remove('error');
            }

            const phone = document.getElementById('phone').value.trim();
            if (!phoneReg.test(phone)) {
                document.getElementById('phoneError').classList.add('show');
                document.getElementById('phone').classList.add('error');
                valid = false;
            } else {
                document.getElementById('phoneError').classList.remove('show');
                document.getElementById('phone').classList.remove('error');
            }

            const content = document.getElementById('content').value.trim();
            if (!content) {
                document.getElementById('contentError').classList.add('show');
                document.getElementById('content').classList.add('error');
                valid = false;
            } else {
                document.getElementById('contentError').classList.remove('show');
                document.getElementById('content').classList.remove('error');
            }

            return valid;
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!validate()) {
                const firstErr = document.querySelector('.error-tip.show');
                if (firstErr) {
                    firstErr.closest('.form-group')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                return;
            }

            const data = {
                feedback_type: document.getElementById('feedbackType').value,
                urgency: document.querySelector('input[name="urgency"]:checked').value,
                name: document.getElementById('name').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                content: document.getElementById('content').value.trim(),
                source: '总经理信箱',
                time: new Date().toLocaleString('zh-CN', { hour12: false })
            };

            submitBtn.disabled = true;
            submitBtn.classList.add('loading');

            try {
                // ===== EmailJS 发送 =====
                const SERVICE_ID = 'service_tfjgo4f';
                const TEMPLATE_ID = 'template_hz6j21g';
                await emailjs.send(SERVICE_ID, TEMPLATE_ID, data);

                document.getElementById('formArea').style.display = 'none';
                document.getElementById('successArea').style.display = 'flex';

                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');

            } catch (err) {
                alert('提交失败，请稍后重试 🙏');
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
            }
        });

        contentEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
