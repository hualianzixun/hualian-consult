<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>华链数字化转型咨询</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 20px;
            padding: 35px 28px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo {
            width: 200px;
            height: auto;
            margin-bottom: 12px;
        }
        .header h1 {
            font-size: 22px;
            color: #333;
            margin-bottom: 6px;
        }
        .header p {
            font-size: 13px;
            color: #888;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group label .required {
            color: #e74c3c;
            margin-left: 2px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            background: #fafafa;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .form-group textarea {
            min-height: 110px;
            resize: vertical;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .submit-btn:active {
            transform: translateY(0);
        }
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .success-msg {
            display: none;
            text-align: center;
            padding: 30px 20px;
        }
        .success-msg .icon {
            width: 70px;
            height: 70px;
            background: #2ecc71;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: #fff;
            font-size: 36px;
        }
        .success-msg h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 8px;
        }
        .success-msg p {
            color: #888;
            font-size: 13px;
        }
        .error-tip {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

                <h1>数字化转型咨询</h1>
                <p>请留下您的信息，我们将尽快与您联系</p>
            </div>
            <form id="consultForm">
                <div class="form-group">
                    <label>姓名 <span class="required">*</span></label>
                    <input type="text" id="name" placeholder="请输入您的姓名" maxlength="20">
                    <div class="error-tip" id="nameError">请输入姓名</div>
                </div>
                <div class="form-group">
                    <label>联系电话 <span class="required">*</span></label>
                    <input type="tel" id="phone" placeholder="请输入手机号码" maxlength="11">
                    <div class="error-tip" id="phoneError">请输入正确的手机号码</div>
                </div>
                <div class="form-group">
                    <label>咨询内容 <span class="required">*</span></label>
                    <textarea id="content" placeholder="请描述您的需求或问题..."></textarea>
                    <div class="error-tip" id="contentError">请输入咨询内容</div>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">提交咨询</button>
            </form>
        </div>

        <div class="success-msg" id="successArea">
            <div class="icon">✓</div>
            <h2>提交成功</h2>
            <p>感谢您的咨询，我们会尽快与您联系！</p>
        </div>
    </div>

    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        // ========== 邮箱配置（已配置） ==========
        emailjs.init('3xRBgUPwHXKo0zh2R'); // Public Key

        const EMAILJS_SERVICE_ID = 'service_tfjgo4f';   // Service ID
        const EMAILJS_TEMPLATE_ID = 'template_hz6j21g'; // Template ID
        // ========================================

        const form = document.getElementById('consultForm');
        const submitBtn = document.getElementById('submitBtn');
        const formArea = document.getElementById('formArea');
        const successArea = document.getElementById('successArea');

        function validate() {
            let valid = true;
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const content = document.getElementById('content').value.trim();

            if (!name) {
                document.getElementById('nameError').style.display = 'block';
                valid = false;
            } else {
                document.getElementById('nameError').style.display = 'none';
            }

            const phoneReg = /^1[3-9]\d{9}$/;
            if (!phoneReg.test(phone)) {
                document.getElementById('phoneError').style.display = 'block';
                valid = false;
            } else {
                document.getElementById('phoneError').style.display = 'none';
            }

            if (!content) {
                document.getElementById('contentError').style.display = 'block';
                valid = false;
            } else {
                document.getElementById('contentError').style.display = 'none';
            }

            return valid;
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!validate()) return;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span>提交中...';

            try {
                const templateParams = {
                    name: document.getElementById('name').value.trim(),
                    phone: document.getElementById('phone').value.trim(),
                    content: document.getElementById('content').value.trim(),
                    time: new Date().toLocaleString('zh-CN'),
                    source: '扫码咨询'
                };

                await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);

                formArea.style.display = 'none';
                successArea.style.display = 'block';
            } catch (err) {
                console.error('提交失败:', err);
                const msg = err && err.text ? err.text : (err && err.message ? err.message : '提交失败，请稍后重试或电话联系');
                alert('提交失败：' + msg);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '提交咨询';
            }
        });

        ['name', 'phone', 'content'].forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                document.getElementById(id + 'Error').style.display = 'none';
            });
        });
    </script>
</body>
</html>
